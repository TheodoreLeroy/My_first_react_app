<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <!-- dayjs -->
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>

    <script type="text/babel">
      function Button() {
        return (
          <>
            <button>Add to Cart</button>
          </>
        );
      }

      function ProductDetails({ name, price, discountPrice, imageSrc }) {
        return (
          <div>
            <img src={imageSrc} width="150" />
            <p>{name}</p>
            {discountPrice ? (
              <del>
                <p>Price: ${price}</p>
              </del>
            ) : (
              <p>Price: ${price}</p>
            )}
            {discountPrice && <p>Discount price: ${discountPrice}</p>}
            <Button />
            <br />
            <br />
          </div>
        );
      }

      function App() {
        return (
          <>
            <ProductDetails
              name="Cotton socks"
              price="10.90"
              discountPrice="5.45"
              imageSrc="cotton-socks.png"
            />
            <ProductDetails
              name="Tennis balls"
              price="6.00"
              imageSrc="tennis-balls.png"
            />
            <ProductDetails
              name="Plain T-Shirt"
              price="7.99"
              imageSrc="plain-t-shirt.png"
            />
          </>
        );
      }

      const container = document.querySelector(".js-container");
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    </script>
  </body>
</html>
